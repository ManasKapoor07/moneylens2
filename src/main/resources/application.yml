spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moneylens}
    username: ${DB_USERNAME:manaskapoor}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:moneylens-super-secret-key-change-in-production-must-be-256-bits}
  expiration: 86400000

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

otp:
  expiry-minutes: 5
  max-attempts: 3
  mock: ${OTP_MOCK:true}

openai:
  api:
    key: ${OPENAI_API_KEY}
  max-tokens: 1500
